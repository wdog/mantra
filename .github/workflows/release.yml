name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Build
        run: go build -ldflags="-s -w" -o mantra-linux-amd64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: mantra-linux-amd64
          generate_release_notes: true
